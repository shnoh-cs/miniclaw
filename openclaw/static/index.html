<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OpenClaw</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --bg: #1a1b26; --surface: #24283b; --surface2: #414868;
  --text: #c0caf5; --text2: #565f89; --accent: #7aa2f7;
  --green: #9ece6a; --red: #f7768e; --yellow: #e0af68;
  --font: 'Segoe UI', system-ui, -apple-system, sans-serif;
  --mono: 'Cascadia Code', 'Fira Code', 'Consolas', monospace;
}
html, body { height: 100%; background: var(--bg); color: var(--text); font-family: var(--font); }

/* Layout */
.app { display: flex; flex-direction: column; height: 100vh; max-width: 900px; margin: 0 auto; }

/* Header */
.header {
  display: flex; align-items: center; gap: 12px;
  padding: 12px 16px; border-bottom: 1px solid var(--surface2);
}
.header h1 { font-size: 16px; font-weight: 600; }
.header .session {
  margin-left: auto; display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--text2);
}
.header .session input {
  background: var(--surface); border: 1px solid var(--surface2); color: var(--text);
  border-radius: 4px; padding: 3px 8px; font-size: 12px; width: 100px;
  font-family: var(--mono);
}
.header .cron-btn {
  background: var(--surface); border: 1px solid var(--surface2); color: var(--text2);
  border-radius: 4px; padding: 3px 8px; font-size: 12px; cursor: pointer;
}
.header .cron-btn:hover { border-color: var(--accent); color: var(--accent); }

/* Messages */
.messages { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 12px; }

.msg { max-width: 85%; padding: 10px 14px; border-radius: 12px; line-height: 1.6; font-size: 14px; white-space: pre-wrap; word-break: break-word; }
.msg.user { align-self: flex-end; background: var(--accent); color: #1a1b26; border-bottom-right-radius: 4px; }
.msg.assistant { align-self: flex-start; background: var(--surface); border-bottom-left-radius: 4px; }
.msg.assistant .streaming-cursor::after { content: '\25AE'; animation: blink 0.8s infinite; color: var(--accent); }
@keyframes blink { 50% { opacity: 0; } }

.msg.error { align-self: flex-start; background: #2d1b2e; border-left: 3px solid var(--red); color: var(--red); }

/* Tool calls */
.tool-call {
  font-family: var(--mono); font-size: 12px; color: var(--text2);
  padding: 4px 10px; margin: 2px 0; border-radius: 6px;
  background: var(--bg); align-self: flex-start; max-width: 85%;
}
.tool-call.ok { border-left: 2px solid var(--green); }
.tool-call.err { border-left: 2px solid var(--red); }
.tool-call.running { border-left: 2px solid var(--yellow); }

/* Compacted notice */
.notice { font-size: 12px; color: var(--text2); text-align: center; padding: 4px; }

/* Input */
.input-area { padding: 12px 16px; border-top: 1px solid var(--surface2); display: flex; gap: 8px; }
.input-area textarea {
  flex: 1; background: var(--surface); border: 1px solid var(--surface2); color: var(--text);
  border-radius: 8px; padding: 10px 14px; font-size: 14px; font-family: var(--font);
  resize: none; outline: none; min-height: 44px; max-height: 200px;
}
.input-area textarea:focus { border-color: var(--accent); }
.input-area button {
  background: var(--accent); color: #1a1b26; border: none; border-radius: 8px;
  padding: 0 20px; font-size: 14px; font-weight: 600; cursor: pointer;
  white-space: nowrap;
}
.input-area button:disabled { opacity: 0.4; cursor: not-allowed; }
.input-area button:hover:not(:disabled) { filter: brightness(1.1); }

/* Cron panel */
.cron-panel {
  display: none; position: fixed; top: 50px; right: 20px;
  background: var(--surface); border: 1px solid var(--surface2);
  border-radius: 8px; padding: 16px; min-width: 300px; max-height: 400px;
  overflow-y: auto; z-index: 100; box-shadow: 0 4px 20px rgba(0,0,0,0.5);
}
.cron-panel.show { display: block; }
.cron-panel h3 { font-size: 14px; margin-bottom: 8px; color: var(--accent); }
.cron-panel .job {
  font-family: var(--mono); font-size: 12px; padding: 6px 0;
  border-bottom: 1px solid var(--bg);
}
.cron-panel .job:last-child { border-bottom: none; }
.cron-panel .empty { font-size: 12px; color: var(--text2); }

/* Scrollbar */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--surface2); border-radius: 3px; }
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <h1>OpenClaw</h1>
    <div class="session">
      <span>session:</span>
      <input id="sessionId" value="web" spellcheck="false">
      <button class="cron-btn" onclick="toggleCron()">cron</button>
    </div>
  </div>

  <div class="cron-panel" id="cronPanel">
    <h3>Scheduled Jobs</h3>
    <div id="cronList"><div class="empty">Loading...</div></div>
  </div>

  <div class="messages" id="messages"></div>

  <div class="input-area">
    <textarea id="input" rows="1" placeholder="Type a message..." autofocus></textarea>
    <button id="sendBtn" onclick="send()">Send</button>
  </div>
</div>

<script>
const messagesEl = document.getElementById('messages');
const inputEl = document.getElementById('input');
const sendBtn = document.getElementById('sendBtn');
const sessionEl = document.getElementById('sessionId');
const cronPanel = document.getElementById('cronPanel');
const cronList = document.getElementById('cronList');

let sending = false;
let pollTimer = null;
let lastMessageCount = 0;

// Auto-resize textarea
inputEl.addEventListener('input', () => {
  inputEl.style.height = 'auto';
  inputEl.style.height = Math.min(inputEl.scrollHeight, 200) + 'px';
});

// Enter to send, Shift+Enter for newline
inputEl.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    send();
  }
});

function scrollToBottom() {
  messagesEl.scrollTop = messagesEl.scrollHeight;
}

function addMessage(role, text) {
  const el = document.createElement('div');
  el.className = `msg ${role}`;
  el.textContent = text;
  messagesEl.appendChild(el);
  scrollToBottom();
  return el;
}

function addToolCall(name, args, status) {
  const el = document.createElement('div');
  el.className = `tool-call ${status}`;
  const argsStr = Object.entries(args).map(([k,v]) => `${k}=${v}`).join(', ');
  el.textContent = `${status === 'running' ? '\u2699' : status === 'ok' ? '\u2713' : '\u2717'} ${name}(${argsStr.slice(0, 80)})`;
  messagesEl.appendChild(el);
  scrollToBottom();
  return el;
}

// ---------------------------------------------------------------------------
// Send message (fire-and-forget) + poll for response
// ---------------------------------------------------------------------------

async function send() {
  if (sending) return;
  const text = inputEl.value.trim();
  if (!text) return;

  sending = true;
  sendBtn.disabled = true;
  inputEl.value = '';
  inputEl.style.height = 'auto';

  addMessage('user', text);

  // Show thinking indicator
  const thinkingEl = document.createElement('div');
  thinkingEl.className = 'msg assistant';
  thinkingEl.innerHTML = '<span class="streaming-cursor"></span>';
  messagesEl.appendChild(thinkingEl);
  scrollToBottom();

  try {
    // Fire-and-forget: send message to server
    const params = new URLSearchParams({action: 'send', message: text, session_id: sessionEl.value});
    const res = await fetch(`?${params}`);

    if (!res.ok) {
      const data = await res.json().catch(() => ({}));
      thinkingEl.remove();
      addMessage('error', data.error || `Server error: ${res.status}`);
      sending = false;
      sendBtn.disabled = false;
      inputEl.focus();
      return;
    }

    // Poll for response
    await pollForResponse(thinkingEl);
  } catch (err) {
    thinkingEl.remove();
    addMessage('error', `Connection error: ${err.message}`);
  }

  sending = false;
  sendBtn.disabled = false;
  inputEl.focus();
}

async function pollForResponse(thinkingEl) {
  const sid = sessionEl.value;
  const startCount = lastMessageCount;

  // Poll every 1.5s until we get new messages and agent is done processing
  for (let i = 0; i < 600; i++) {  // max ~15 minutes
    await sleep(1500);

    try {
      // Check status + history in parallel
      const [statusRes, histRes] = await Promise.all([
        fetch(`?action=status&session_id=${encodeURIComponent(sid)}`),
        fetch(`?action=history&session_id=${encodeURIComponent(sid)}`),
      ]);

      const status = await statusRes.json();
      const data = await histRes.json();

      if (data.messages.length > lastMessageCount) {
        // Remove thinking indicator
        thinkingEl.remove();

        // Show new messages
        const newMsgs = data.messages.slice(lastMessageCount);
        for (const msg of newMsgs) {
          if (msg.role === 'user' && msg.text) {
            // Skip — we already showed the user message locally
          } else if (msg.role === 'assistant' && msg.text) {
            addMessage('assistant', msg.text);
          }
          if (msg.tool_calls) {
            for (const tc of msg.tool_calls) {
              if (tc.name !== 'result') {
                addToolCall(tc.name, tc.args || {}, 'ok');
              }
            }
          }
        }
        lastMessageCount = data.messages.length;
        scrollToBottom();
      }

      // Done when agent is no longer processing
      if (!status.processing && data.messages.length > startCount) {
        return;
      }
    } catch (e) {
      // Ignore poll failures, keep trying
    }
  }

  // Timeout
  thinkingEl.remove();
  addMessage('error', 'Response timeout');
}

function sleep(ms) {
  return new Promise(resolve => setTimeout(resolve, ms));
}

// ---------------------------------------------------------------------------
// Cron panel
// ---------------------------------------------------------------------------
function toggleCron() {
  cronPanel.classList.toggle('show');
  if (cronPanel.classList.contains('show')) refreshCron();
}

async function refreshCron() {
  try {
    const res = await fetch('?action=cron');
    const jobs = await res.json();
    if (jobs.length === 0) {
      cronList.innerHTML = '<div class="empty">No scheduled jobs</div>';
    } else {
      cronList.innerHTML = jobs.map(j =>
        `<div class="job"><b>${j.name}</b> [${j.status}]<br>${j.schedule} | runs: ${j.run_count}${j.last_error ? '<br><span style="color:var(--red)">'+j.last_error+'</span>' : ''}</div>`
      ).join('');
    }
  } catch (e) {
    cronList.innerHTML = '<div class="empty">Failed to load</div>';
  }
}

setInterval(() => { if (cronPanel.classList.contains('show')) refreshCron(); }, 30000);

// ---------------------------------------------------------------------------
// Load previous messages on page load
// ---------------------------------------------------------------------------

async function loadHistory() {
  const sid = sessionEl.value;
  try {
    const res = await fetch(`?action=history&session_id=${encodeURIComponent(sid)}`);
    if (!res.ok || !res.headers.get('content-type')?.includes('json')) return;
    const data = await res.json();

    messagesEl.innerHTML = '';

    if (data.compaction_summary) {
      const notice = document.createElement('div');
      notice.className = 'notice';
      notice.textContent = '(previous conversation compacted)';
      messagesEl.appendChild(notice);
    }

    for (const msg of data.messages) {
      if (msg.role === 'user' && msg.text) {
        addMessage('user', msg.text);
      } else if (msg.role === 'assistant' && msg.text) {
        addMessage('assistant', msg.text);
      }
      if (msg.tool_calls) {
        for (const tc of msg.tool_calls) {
          if (tc.name !== 'result') {
            addToolCall(tc.name, tc.args || {}, 'ok');
          }
        }
      }
    }

    lastMessageCount = data.messages.length;
    scrollToBottom();
  } catch (e) {
    console.warn('Failed to load history:', e);
  }
}

// Poll for new messages (cron notifications) every 10s
async function pollNewMessages() {
  if (sending) return;
  const sid = sessionEl.value;
  try {
    const res = await fetch(`?action=history&session_id=${encodeURIComponent(sid)}`);
    if (!res.ok) return;
    const data = await res.json();
    if (data.messages.length > lastMessageCount) {
      const newMsgs = data.messages.slice(lastMessageCount);
      for (const msg of newMsgs) {
        if (msg.role === 'assistant' && msg.text) {
          addMessage('assistant', msg.text);
        }
        if (msg.tool_calls) {
          for (const tc of msg.tool_calls) {
            if (tc.name !== 'result') {
              addToolCall(tc.name, tc.args || {}, 'ok');
            }
          }
        }
      }
      lastMessageCount = data.messages.length;
      scrollToBottom();
    }
  } catch (e) { /* ignore */ }
}

setInterval(pollNewMessages, 10000);

// Load on startup
loadHistory();

// Reload history when session changes
sessionEl.addEventListener('change', loadHistory);
</script>
</body>
</html>
